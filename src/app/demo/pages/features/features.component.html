<div class="row">
  <div class="col-sm-12">
    @if (showForm) {
      <div class="card mb-4 animate__animated animate__fadeIn">
        <div class="card-header">
          <h5>{{ editingFeature ? 'Edit Feature' : 'Add New Feature' }}</h5>
        </div>
        <div class="card-body">
          <form (ngSubmit)="saveFeature()">
            <div class="form-group mb-3">
              <label class="form-label">Description</label>
              <textarea class="form-control" name="description" [(ngModel)]="featureDescription" rows="3" placeholder="Enter feature description" required></textarea>
            </div>
            <div class="d-flex justify-content-end gap-2">
              <button type="button" class="btn btn-light" (click)="cancelForm()">Cancel</button>
              <button type="submit" class="btn btn-primary" [disabled]="submitting || !featureDescription.trim()">
                @if (submitting) {
                  <span class="spinner-border spinner-border-sm me-1"></span>
                }
                {{ editingFeature ? 'Update' : 'Save' }}
              </button>
            </div>
          </form>
        </div>
      </div>
    }

    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Features</h5>
        <button class="btn btn-primary btn-sm" (click)="addFeature()" [disabled]="showForm">
          <i class="ti ti-plus me-1"></i> Add Feature
        </button>
      </div>
      <div class="card-body">
        @if (loading) {
          <div class="text-center p-5">
            <div class="spinner-border text-primary" role="status"></div>
          </div>
        } @else if (error) {
          <div class="alert alert-danger m-3">{{ error }}</div>
        } @else {
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Description</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody>
                @for (feature of features; track feature.id) {
                  <tr>
                    <td>{{ feature.id }}</td>
                    <td>{{ feature.description }}</td>
                    <td class="text-end">
                      <button class="btn btn-icon btn-light-primary me-2" (click)="editFeature(feature)">
                        <i class="ti ti-pencil"></i>
                      </button>
                      <button class="btn btn-icon btn-light-danger" (click)="deleteFeature(feature.id)">
                        <i class="ti ti-trash"></i>
                      </button>
                    </td>
                  </tr>
                } @empty {
                  <tr>
                    <td colspan="3" class="text-center p-5 text-muted">No features found.</td>
                  </tr>
                }
              </tbody>
            </table>
          </div>
        }
      </div>
    </div>
  </div>
</div>
