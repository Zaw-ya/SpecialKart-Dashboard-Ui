<div class="row">
  <div class="col-sm-12">
    <!-- Form Card -->
    @if (showForm) {
      <div class="card mb-4 animate__animated animate__fadeIn">
        <div class="card-header">
          <h5>{{ editingCountry ? 'Edit Country' : 'Add New Country' }}</h5>
        </div>
        <div class="card-body">
          <form (ngSubmit)="saveCountry()">
            <div class="form-group mb-3">
              <label class="form-label">Country Name</label>
              <input type="text" class="form-control" name="name" [(ngModel)]="countryName" placeholder="Enter country name" required />
            </div>
            <div class="d-flex justify-content-end gap-2">
              <button type="button" class="btn btn-light" (click)="cancelForm()">Cancel</button>
              <button type="submit" class="btn btn-primary" [disabled]="submitting || !countryName.trim()">
                @if (submitting) {
                  <span class="spinner-border spinner-border-sm me-1"></span>
                }
                {{ editingCountry ? 'Update' : 'Save' }}
              </button>
            </div>
          </form>
        </div>
      </div>
    }

    <!-- Table Card -->
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Countries</h5>
        <button class="btn btn-primary btn-sm" (click)="addCountry()" [disabled]="showForm">
          <i class="ti ti-plus me-1"></i> Add Country
        </button>
      </div>
      <div class="card-body">
        @if (loading) {
          <div class="text-center p-5">
            <div class="spinner-border text-primary" role="status"></div>
          </div>
        } @else if (error) {
          <div class="alert alert-danger m-3">{{ error }}</div>
        } @else {
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody>
                @for (country of countries; track country.id) {
                  <tr>
                    <td>{{ country.id }}</td>
                    <td>
                      <h6 class="mb-0">{{ country.name }}</h6>
                    </td>
                    <td class="text-end">
                      <button class="btn btn-icon btn-light-primary me-2" (click)="editCountry(country)">
                        <i class="ti ti-edit"></i>
                      </button>
                      <button class="btn btn-icon btn-light-danger" (click)="deleteCountry(country.id)">
                        <i class="ti ti-trash"></i>
                      </button>
                    </td>
                  </tr>
                } @empty {
                  <tr>
                    <td colspan="3" class="text-center p-5 text-muted">No countries found.</td>
                  </tr>
                }
              </tbody>
            </table>
          </div>
        }
      </div>
    </div>
  </div>
</div>
