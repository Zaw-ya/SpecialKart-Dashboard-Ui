<div class="row">
  <div class="col-sm-12">
    <!-- Form Card -->
    @if (showForm) {
      <div class="card mb-4 animate__animated animate__fadeIn">
        <div class="card-header">
          <h5>{{ editingCity ? 'Edit City' : 'Add New City' }}</h5>
        </div>
        <div class="card-body">
          <form (ngSubmit)="saveCity()">
            <div class="row">
              <div class="col-md-6">
                <div class="form-group mb-3">
                  <label class="form-label">City Name</label>
                  <input type="text" class="form-control" name="name" [(ngModel)]="cityName" placeholder="Enter city name" required />
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group mb-3">
                  <label class="form-label">Country</label>
                  <select class="form-select" name="countryId" [(ngModel)]="selectedCountryId" required>
                    @for (country of countries; track country.id) {
                      <option [value]="country.id">{{ country.name }}</option>
                    }
                  </select>
                </div>
              </div>
            </div>
            <div class="d-flex justify-content-end gap-2">
              <button type="button" class="btn btn-light" (click)="cancelForm()">Cancel</button>
              <button type="submit" class="btn btn-primary" [disabled]="submitting || !cityName.trim() || !selectedCountryId">
                @if (submitting) {
                  <span class="spinner-border spinner-border-sm me-1"></span>
                }
                {{ editingCity ? 'Update' : 'Save' }}
              </button>
            </div>
          </form>
        </div>
      </div>
    }

    <!-- Table Card -->
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Cities</h5>
        <button class="btn btn-primary btn-sm" (click)="addCity()" [disabled]="showForm">
          <i class="ti ti-plus me-1"></i> Add City
        </button>
      </div>
      <div class="card-body">
        @if (loading) {
          <div class="text-center p-5">
            <div class="spinner-border text-primary" role="status"></div>
          </div>
        } @else if (error) {
          <div class="alert alert-danger m-3">{{ error }}</div>
        } @else {
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Country</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody>
                @for (city of cities; track city.id) {
                  <tr>
                    <td>{{ city.id }}</td>
                    <td>
                      <h6 class="mb-0">{{ city.name }}</h6>
                    </td>
                    <td>
                      <span class="badge bg-light-primary text-primary">{{ getCountryName(city.countryId) }}</span>
                    </td>
                    <td class="text-end">
                      <button class="btn btn-icon btn-light-primary me-2" (click)="editCity(city)">
                        <i class="ti ti-edit"></i>
                      </button>
                      <button class="btn btn-icon btn-light-danger" (click)="deleteCity(city.id)">
                        <i class="ti ti-trash"></i>
                      </button>
                    </td>
                  </tr>
                } @empty {
                  <tr>
                    <td colspan="4" class="text-center p-5 text-muted">No cities found.</td>
                  </tr>
                }
              </tbody>
            </table>
          </div>
        }
      </div>
    </div>
  </div>
</div>
